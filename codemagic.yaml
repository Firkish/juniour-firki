workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    instance_type: linux_x86_64
    environment:
      java: 17
    scripts:
      - name: Build Android APK
        script: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
