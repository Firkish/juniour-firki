workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Set Permission and Build
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
